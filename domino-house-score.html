<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fffef9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="House of Bones">
    <link rel="manifest" href="./manifest.json">
    <title>House of Bones</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@700&family=Work+Sans:wght@400;600;700&display=swap');

        :root {
            --ink: #1c1f2e;
            --ink-soft: #3a4161;
            --accent: #ff6b4a;
            --accent-2: #27b3a4;
            --sun: #ffe177;
            --paper: #fffdf7;
            --card: #ffffff;
            --line: #d8dce9;
            --shadow: rgba(34, 41, 62, 0.12);
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Work Sans', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background:
                radial-gradient(circle at 8% 10%, #fff7d8, transparent 40%),
                radial-gradient(circle at 88% 0%, #f6f9ff, transparent 45%),
                linear-gradient(180deg, #fffef9 0%, #f2f7ff 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mark {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--sun));
            box-shadow: 0 10px 25px rgba(255, 107, 74, 0.3);
        }

        h1 {
            font-family: 'Cabin Sketch', 'Trebuchet MS', sans-serif;
            font-size: 36px;
            margin: 0;
            letter-spacing: 1px;
        }

        .tagline {
            margin: 4px 0 0;
            color: var(--ink-soft);
            font-weight: 600;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--line);
            font-weight: 600;
            color: var(--ink-soft);
            box-shadow: 0 6px 16px var(--shadow);
        }

        button {
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 74, 0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        button.secondary {
            background: #ffffff;
            color: var(--ink);
            border: 1px solid var(--line);
            box-shadow: 0 6px 16px var(--shadow);
        }

        button:hover { transform: translateY(-1px); }

        .board {
            margin-top: 26px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        .player-col {
            background: var(--card);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid var(--line);
            box-shadow: 0 10px 25px var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .player-col.winner {
            border: 2px solid var(--accent-2);
            box-shadow: 0 12px 26px rgba(39, 179, 164, 0.35);
            transform: translateY(-4px);
        }

        .name-box {
            width: 100%;
            text-align: center;
            background: #f4f6ff;
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 700;
            font-size: 16px;
        }

        .score-area {
            min-height: 360px;
            width: 100%;
            cursor: pointer;
            border-radius: 16px;
            border: 1px dashed #c8d2f2;
            background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
            padding: 8px 0;
        }

        .house { width: 80px; height: 80px; position: relative; margin: 12px auto; }
        .line-v { position: absolute; width: 4px; height: 100%; background: var(--ink); left: 38px; top: 0; }
        .line-h { position: absolute; height: 4px; width: 100%; background: var(--ink); top: 38px; left: 0; }
        .quad { position: absolute; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; }
        .q-ul { top: 4px; left: 4px; }
        .q-ur { top: 4px; right: 4px; }
        .q-ll { bottom: 4px; left: 4px; }
        .q-lr { bottom: 4px; right: 4px; }
        .slash { width: 4px; height: 26px; background: var(--ink); transform: rotate(-45deg); }
        .circle { width: 22px; height: 22px; border: 4px solid var(--ink); border-radius: 50%; }

        .total-box {
            width: 100%;
            text-align: center;
            background: #fff6e8;
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 700;
            font-size: 20px;
        }

        .undo-btn { width: 100%; }

        .winner-banner {
            margin-top: 18px;
            padding: 12px 18px;
            border-radius: 14px;
            background: #e7fff7;
            border: 1px solid #bceee0;
            color: #1a6a5f;
            font-weight: 700;
            text-align: center;
            display: none;
        }

        .winner-banner.show { display: block; }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 25, 40, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 10;
        }

        .modal-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            width: min(520px, 100%);
            box-shadow: 0 30px 60px rgba(18, 24, 40, 0.25);
        }

        .modal-card h2 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .modal-card p {
            margin: 0 0 16px;
            color: var(--ink-soft);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .field input {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            font-size: 15px;
        }

        .name-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 720px) {
            .score-area { min-height: 280px; }
            .hero { justify-content: center; }
            .controls { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="hero">
            <div class="brand">
                <div class="mark"></div>
                <div>
                    <h1>House of Bones</h1>
                    <div class="tagline">Bones on deck. Scores on lock</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="resetGame()">New Game</button>
                <button class="secondary" onclick="openEdit()">Edit Match</button>
                <div class="pill" id="target-pill">Target: --</div>
                <button class="secondary" onclick="window.location.reload()">Home</button>
            </div>
        </div>

        <div class="winner-banner" id="winner-banner"></div>
        <div class="board" id="board"></div>
    </div>

    <div class="modal" id="setup-modal">
        <form class="modal-card" id="setup-form">
            <h2 id="setup-title">Start a new match</h2>
            <p id="setup-subtitle">Set up players and the points to win.</p>

            <label class="field">
                How many players?
                <input id="player-count" type="number" min="2" max="6" value="4" required>
            </label>

            <label class="field">
                Play to how many points?
                <input id="target-points" type="number" min="50" step="5" value="150" required>
            </label>

            <div class="field">Player names</div>
            <div class="name-grid" id="name-grid"></div>

            <div class="modal-actions">
                <button type="button" class="secondary" id="cancel-btn">Cancel</button>
                <button type="submit">Start Game</button>
            </div>
        </form>
    </div>


    <script>
        let players = [];
        let scores = [];
        let targetPoints = 0;
        let gameOver = false;
        let isEditing = false;

        const board = document.getElementById('board');
        const targetPill = document.getElementById('target-pill');
        const winnerBanner = document.getElementById('winner-banner');
        const setupModal = document.getElementById('setup-modal');
        const playerCountInput = document.getElementById('player-count');
        const targetInput = document.getElementById('target-points');
        const nameGrid = document.getElementById('name-grid');
        const setupTitle = document.getElementById('setup-title');
        const setupSubtitle = document.getElementById('setup-subtitle');
        const cancelBtn = document.getElementById('cancel-btn');

        function openSetup() {
            isEditing = false;
            setupModal.style.display = 'flex';
            winnerBanner.classList.remove('show');
            winnerBanner.textContent = '';
            gameOver = false;
            playerCountInput.disabled = false;
            setupTitle.textContent = 'Start a new match';
            setupSubtitle.textContent = 'Set up players and the points to win.';
            targetInput.value = targetPoints || 150;
            cancelBtn.style.display = 'none';
            buildNameInputs();
        }

        function openEdit() {
            if (players.length === 0) {
                openSetup();
                return;
            }
            isEditing = true;
            setupModal.style.display = 'flex';
            playerCountInput.value = players.length;
            playerCountInput.disabled = true;
            targetInput.value = targetPoints || 150;
            setupTitle.textContent = 'Edit this match';
            setupSubtitle.textContent = 'Update player names or the target score.';
            cancelBtn.style.display = 'inline-flex';
            buildNameInputs();
        }

        function buildNameInputs() {
            const rawCount = parseInt(playerCountInput.value, 10) || 2;
            const count = clampPlayers(rawCount);
            playerCountInput.value = count;
            nameGrid.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.placeholder = `Player ${i + 1}`;
                nameInput.maxLength = 20;
                nameInput.value = players[i] || '';
                nameGrid.appendChild(nameInput);
            }
        }

        function clampPlayers(val) {
            if (val < 2) return 2;
            if (val > 6) return 6;
            return val;
        }

        function setupGame(event) {
            event.preventDefault();
            const count = clampPlayers(parseInt(playerCountInput.value, 10) || 2);
            targetPoints = Math.max(50, parseInt(targetInput.value, 10) || 100);

            players = Array.from(nameGrid.querySelectorAll('input')).map((input, index) => {
                const name = input.value.trim();
                return name.length ? name : `Player ${index + 1}`;
            });

            if (!isEditing) {
                scores = new Array(count).fill(0);
                gameOver = false;
                winnerBanner.classList.remove('show');
                winnerBanner.textContent = '';
            }

            targetPill.textContent = `Target: ${targetPoints}`;
            renderBoard();
            renderScores();
            if (isEditing) {
                checkWinner();
            }
            setupModal.style.display = 'none';
        }

        function renderBoard() {
            board.innerHTML = '';
            players.forEach((player, index) => {
                const col = document.createElement('div');
                col.className = 'player-col';
                col.innerHTML = `
                    <div class="name-box">${escapeHtml(player)}</div>
                    <div class="score-area" id="area-${index}" onclick="addScore(${index})"></div>
                    <div class="total-box" id="t-${index}">0</div>
                    <button class="undo-btn secondary" onclick="undo(${index})">Undo 5 pts</button>
                `;
                board.appendChild(col);
            });
        }

        function renderScores() {
            scores.forEach((score, index) => {
                const total = document.getElementById(`t-${index}`);
                const area = document.getElementById(`area-${index}`);
                if (!total || !area) return;
                total.textContent = score;
                area.innerHTML = '';

                let val = score;
                while (val >= 50) {
                    area.innerHTML += drawHouse(50);
                    val -= 50;
                }
                if (val > 0) area.innerHTML += drawHouse(val);
            });
        }

        function drawHouse(v) {
            let h = '<div class="house">';
            if (v >= 5) h += '<div class="line-v"></div>';
            if (v >= 10) h += '<div class="line-h"></div>';
            if (v >= 15) {
                h += '<div class="quad q-ul">' + (v >= 20 ? '<div class="circle"></div>' : '<div class="slash"></div>') + '</div>';
            }
            if (v >= 25) {
                h += '<div class="quad q-ur">' + (v >= 30 ? '<div class="circle"></div>' : '<div class="slash"></div>') + '</div>';
            }
            if (v >= 35) {
                h += '<div class="quad q-ll">' + (v >= 40 ? '<div class="circle"></div>' : '<div class="slash"></div>') + '</div>';
            }
            if (v >= 45) {
                h += '<div class="quad q-lr">' + (v >= 50 ? '<div class="circle"></div>' : '<div class="slash"></div>') + '</div>';
            }
            h += '</div>';
            return h;
        }

        function addScore(index) {
            if (gameOver) return;
            scores[index] += 5;
            renderScores();
            checkWinner();
        }

        function undo(index) {
            if (gameOver) return;
            if (scores[index] >= 5) {
                scores[index] -= 5;
                renderScores();
            }
        }

        function checkWinner() {
            const winnerIndex = scores.findIndex(score => score >= targetPoints);
            if (winnerIndex === -1) return;

            gameOver = true;
            const winnerName = players[winnerIndex];
            winnerBanner.textContent = `${winnerName} wins with ${scores[winnerIndex]} points!`;
            winnerBanner.classList.add('show');

            Array.from(document.querySelectorAll('.player-col')).forEach((col, idx) => {
                if (idx === winnerIndex) col.classList.add('winner');
            });
        }

        function resetGame() {
            if (confirm('Start a new game?')) {
                openSetup();
            }
        }

        function cancelEdit() {
            if (!isEditing) return;
            setupModal.style.display = 'none';
        }


        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        playerCountInput.addEventListener('input', buildNameInputs);
        document.getElementById('setup-form').addEventListener('submit', setupGame);
        cancelBtn.addEventListener('click', cancelEdit);

        openSetup();
    </script>
</body>
</html>
